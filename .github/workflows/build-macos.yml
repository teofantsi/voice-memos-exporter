name: Build macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app bundle
        run: pyinstaller voice_memos_exporter.spec

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Memos-Exporter-macOS
          path: dist/Voice Memos Exporter.app
          if-no-files-found: error

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Voice Memos Exporter.app" \
            "Voice-Memos-Exporter-${GITHUB_REF_NAME}.zip"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "Voice-Memos-Exporter-${{ github.ref_name }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
